# 1. Define the backend server (Upstream)
# This tells Nginx that 'django_backend' refers to the 'web' service on port 8000
upstream django_backend {
    server web:8000;
}

# 2. Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name api.cashevide.com; # Replace with your actual domain

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. Main HTTPS server configuration
server {
    listen 443 ssl;
    server_name api.cashevide.com;

    # SSL Certificates (Managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/api.cashevide.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.cashevide.com/privkey.pem;

    # Performance: Gzip Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Security: HSTS and other Hardening Headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    # Logging: Custom access and error logs
    access_log /var/log/nginx/cashevide_access.log;
    error_log /var/log/nginx/cashevide_error.log;

    # Allow larger file uploads (e.g., for invoices/profile pictures)
    client_max_body_size 10M;

    # Buffers for long JWT tokens and cookies
    proxy_buffer_size   128k;
    proxy_buffers       4 256k;
    proxy_busy_buffers_size 256k;

    # Security: Referrer Policy
    add_header Referrer-Policy "no-referrer-when-downgrade";

    # Timeout settings for long-running requests (like PDF generation)
    proxy_read_timeout 300s;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;

    location / {
        proxy_pass http://django_backend;

        # Headers to preserve client information and handle cookies correctly
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ensure Set-Cookie headers are passed back to the client
        proxy_pass_header Set-Cookie;
    }

    # Serve static assets (Admin CSS, JS, etc.)
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Serve user-uploaded media files
    location /media/ {
        alias /app/media/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }
}
