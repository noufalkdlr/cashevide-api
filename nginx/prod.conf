# 1. Define the backend server (Upstream)
# This tells Nginx that 'django_backend' refers to the 'web' service on port 8000
upstream django_backend {
    server web:8000;
}

# 2. Redirect all HTTP traffic to HTTPS
server {
    listen 80;
    server_name api.zymino.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# 3. Main HTTPS server configuration
server {
    listen 443 ssl;
    server_name api.zymino.com;

    # SSL Certificates obtained via Certbot
    ssl_certificate /etc/letsencrypt/live/api.zymino.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.zymino.com/privkey.pem;

    # Allow larger file uploads (e.g., for invoices/profile pictures)
    client_max_body_size 10M;

    location / {
        proxy_pass http://django_backend;

        # Headers to preserve client information and handle cookies correctly
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Ensure Set-Cookie headers are passed back to the client
        proxy_pass_header Set-Cookie;
    }

    # Serve static assets (Admin CSS, JS, etc.)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Serve user-uploaded media files
    location /media/ {
        alias /app/media/;
    }
}
