info:
  name: User Login (Multi-platform)
  type: http
  seq: 1
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/users/login/"
  body:
    type: json
    data: |-
      {
        "email": "",
        "password": "",
        "platform": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: No response body
    request:
      url: "{{baseUrl}}/api/users/login/"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "password": "",
            "platform": ""
          }
    response:
      status: 200
      statusText: OK
      body:
        type: text
        data: ""
