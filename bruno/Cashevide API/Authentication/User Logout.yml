info:
  name: User Logout
  type: http
  seq: 2
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/users/logout/"
  body:
    type: json
    data: |-
      {
        "refresh": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/users/logout/"
      method: POST
      body:
        type: json
        data: |-
          {
            "refresh": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: "{}"
