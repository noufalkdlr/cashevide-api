info:
  name: Request OTP
  type: http
  seq: 4
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/users/request-otp/"
  body:
    type: json
    data: |-
      {
        "email": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    description: OTP sent successfully.
    request:
      url: "{{baseUrl}}/api/users/request-otp/"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": ""
          }
  - name: 400 Response
    description: Bad Request. Invalid email format, or email already registered.
    request:
      url: "{{baseUrl}}/api/users/request-otp/"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": ""
          }
    response:
      status: 400
      statusText: Bad Request
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
