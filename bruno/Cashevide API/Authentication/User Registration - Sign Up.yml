info:
  name: User Registration / Sign Up
  type: http
  seq: 5
  tags:
    - Authentication

http:
  method: POST
  url: "{{baseUrl}}/api/users/signup/"
  body:
    type: json
    data: |-
      {
        "email": "",
        "username": "",
        "password": "",
        "full_name": "",
        "referral_code_input": "",
        "platform": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    request:
      url: "{{baseUrl}}/api/users/signup/"
      method: POST
      body:
        type: json
        data: |-
          {
            "email": "",
            "username": "",
            "password": "",
            "full_name": "",
            "referral_code_input": "",
            "platform": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "message": "",
            "data": {
              "id": 0,
              "email": "",
              "username": ""
            }
          }
