info:
  name: List all clients (Superuser only)
  type: http
  seq: 2
  tags:
    - Clients

http:
  method: GET
  url: "{{baseUrl}}/api/clients/"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/clients/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": "",
              "phone_number": ""
            }
          ]
