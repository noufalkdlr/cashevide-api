info:
  name: Lookup Client ID by Phone Number
  type: http
  seq: 1
  tags:
    - Clients

http:
  method: POST
  url: "{{baseUrl}}/api/client-lookup/"
  body:
    type: json
    data: |-
      {
        "phone_number": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/client-lookup/"
      method: POST
      body:
        type: json
        data: |-
          {
            "phone_number": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "client_id": "",
            "message": ""
          }
  - name: 404 Response
    request:
      url: "{{baseUrl}}/api/client-lookup/"
      method: POST
      body:
        type: json
        data: |-
          {
            "phone_number": ""
          }
    response:
      status: 404
      statusText: Not Found
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "error": ""
          }
