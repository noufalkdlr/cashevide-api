info:
  name: Partial Update User Profile
  type: http
  seq: 4
  tags:
    - Users

http:
  method: PATCH
  url: "{{baseUrl}}/api/users/profile/me/"
  body:
    type: multipart-form
    data:
      - name: full_name
        type: text
        value: ""
      - name: profile_picture
        type: file
        value: []
      - name: phone_number
        type: text
        value: ""
      - name: job_title
        type: text
        value: ""
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/users/profile/me/"
      method: PATCH
      body:
        type: multipart-form
        data:
          - name: full_name
            type: text
            value: ""
          - name: profile_picture
            type: file
            value: []
          - name: phone_number
            type: text
            value: ""
          - name: job_title
            type: text
            value: ""
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "user_id": 0,
            "email": "",
            "username": "",
            "full_name": "",
            "profile_picture": "",
            "phone_number": "",
            "job_title": "",
            "referral_code": "",
            "referred_by": 0,
            "credit_points": 0
          }
