info:
  name: Get User Profile
  type: http
  seq: 2
  tags:
    - Users

http:
  method: GET
  url: "{{baseUrl}}/api/users/profile/me/"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/users/profile/me/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "user_id": 0,
            "email": "",
            "username": "",
            "full_name": "",
            "profile_picture": "",
            "phone_number": "",
            "job_title": "",
            "referral_code": "",
            "referred_by": 0,
            "credit_points": 0
          }
