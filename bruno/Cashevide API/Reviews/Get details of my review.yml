info:
  name: Get details of my review
  type: http
  seq: 8
  tags:
    - Reviews

http:
  method: GET
  url: "{{baseUrl}}/api/my-reviews/:id/"
  params:
    - name: id
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/my-reviews/:id/"
      method: GET
      params:
        - name: id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "author": "",
            "tags": [
              {
                "id": 0,
                "name": "",
                "category": "POSITIVE",
                "group": ""
              }
            ],
            "client": {
              "id": "",
              "phone_number": ""
            }
          }
