info:
  name: Update my review
  type: http
  seq: 9
  tags:
    - Reviews

http:
  method: PUT
  url: "{{baseUrl}}/api/my-reviews/:id/"
  params:
    - name: id
      value: ""
      type: path
  body:
    type: json
    data: |-
      {
        "tags": []
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/my-reviews/:id/"
      method: PUT
      params:
        - name: id
          value: ""
          type: path
      body:
        type: json
        data: |-
          {
            "tags": []
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "author": 0,
            "tags": [],
            "client": ""
          }
