info:
  name: Get reviews for a client
  type: http
  seq: 1
  tags:
    - Reviews

http:
  method: GET
  url: "{{baseUrl}}/api/client/:client_id/reviews/"
  params:
    - name: client_id
      value: ""
      type: path
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/client/:client_id/reviews/"
      method: GET
      params:
        - name: client_id
          value: ""
          type: path
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "tags": [
                {
                  "id": 0,
                  "name": "",
                  "category": "POSITIVE",
                  "group": ""
                }
              ],
              "author": ""
            }
          ]
