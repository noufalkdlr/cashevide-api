info:
  name: Partially update a tag
  type: http
  seq: 5
  tags:
    - Tags

http:
  method: PATCH
  url: "{{baseUrl}}/api/tags/:id/"
  params:
    - name: id
      value: ""
      type: path
      description: A unique integer value identifying this tag.
  body:
    type: json
    data: |-
      {
        "name": "",
        "category": "POSITIVE",
        "group": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/tags/:id/"
      method: PATCH
      params:
        - name: id
          value: ""
          type: path
          description: A unique integer value identifying this tag.
      body:
        type: json
        data: |-
          {
            "name": "",
            "category": "POSITIVE",
            "group": ""
          }
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "name": "",
            "category": "POSITIVE",
            "group": ""
          }
