info:
  name: List all available tags
  type: http
  seq: 1
  tags:
    - Tags

http:
  method: GET
  url: "{{baseUrl}}/api/tags/"
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 200 Response
    request:
      url: "{{baseUrl}}/api/tags/"
      method: GET
    response:
      status: 200
      statusText: OK
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          [
            {
              "id": 0,
              "name": "",
              "category": "POSITIVE",
              "group": ""
            }
          ]
