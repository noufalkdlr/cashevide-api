info:
  name: Create a new pre-defined tag
  type: http
  seq: 2
  tags:
    - Tags

http:
  method: POST
  url: "{{baseUrl}}/api/tags/"
  body:
    type: json
    data: |-
      {
        "name": "",
        "category": "POSITIVE",
        "group": ""
      }
  auth:
    type: bearer
    token: "{{token}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

examples:
  - name: 201 Response
    request:
      url: "{{baseUrl}}/api/tags/"
      method: POST
      body:
        type: json
        data: |-
          {
            "name": "",
            "category": "POSITIVE",
            "group": ""
          }
    response:
      status: 201
      statusText: Created
      headers:
        - name: Content-Type
          value: application/json
      body:
        type: json
        data: |-
          {
            "id": 0,
            "name": "",
            "category": "POSITIVE",
            "group": ""
          }
